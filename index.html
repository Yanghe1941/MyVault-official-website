<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>MyVault — Official Website</title>
  <meta name="description" content="MyVault is a privacy-first, local-first iOS app for managing real-world assets and keepsakes." />
  <link rel="stylesheet" href="/assets/style.css" />
  <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml" />
</head>
<body>
  <nav class="nav">
    <div class="container nav-inner">
      <div class="brand">MyVault</div>
      <div class="links">
        <span class="badge" style="display:block; border:1px solid var(--line); padding:6px 14px; border-radius:999px; font-size:12px; color:var(--muted)">Official Website</span>
      </div>
    </div>
  </nav>

  <main class="container">
    <section class="hero reveal active" style="min-height:70vh; display:flex; flex-direction:column; justify-content:center">
      <h1 class="h-title">Choose Your Language<br>选择您的语言</h1>
      <p class="h-sub">MyVault — 隐私优先的现实资产与纪念物管理<br>Privacy-first Asset & Keepsake Manager</p>
      <div class="cta-row" style="justify-content:center; margin-top:40px">
        <a class="btn primary" href="/zh/">简体中文</a>
        <a class="btn" href="/en/" style="border:1.5px solid var(--accent); color:var(--accent)">English</a>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container">
      <p>© <span id="y"></span> MyVault. Privacy-first, Local-first.</p>
    </div>
  </footer>
  <script>
    document.getElementById('y').textContent = new Date().getFullYear();
  </script>
</body>
</html>
